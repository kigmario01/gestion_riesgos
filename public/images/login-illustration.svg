<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" fill="none">
  <!-- Background subtle shapes -->
  <circle cx="420" cy="80" r="60" fill="#fff3e0" opacity="0.5"/>
  <circle cx="80" cy="380" r="40" fill="#fff3e0" opacity="0.4"/>

  <!-- Screen / browser window -->
  <rect x="90" y="60" width="220" height="160" rx="12" fill="white" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="90" y="60" width="220" height="28" rx="12" fill="#f5f5f5"/>
  <rect x="90" y="76" width="220" height="12" fill="#f5f5f5"/>
  <circle cx="108" cy="74" r="5" fill="#ff5f57"/>
  <circle cx="122" cy="74" r="5" fill="#febc2e"/>
  <circle cx="136" cy="74" r="5" fill="#28c840"/>
  <!-- Browser content lines -->
  <rect x="108" y="106" width="60" height="8" rx="4" fill="#f97316" opacity="0.7"/>
  <rect x="108" y="122" width="120" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="108" y="134" width="100" height="6" rx="3" fill="#e5e7eb"/>
  <!-- Password dots row -->
  <rect x="108" y="150" width="140" height="24" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="122" cy="162" r="4" fill="#374151"/>
  <circle cx="134" cy="162" r="4" fill="#374151"/>
  <circle cx="146" cy="162" r="4" fill="#374151"/>
  <circle cx="158" cy="162" r="4" fill="#374151"/>
  <circle cx="170" cy="162" r="4" fill="#374151"/>
  <circle cx="182" cy="162" r="4" fill="#374151"/>
  <!-- Login button -->
  <rect x="108" y="182" width="80" height="22" rx="6" fill="#f97316"/>
  <text x="148" y="197" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">SIGN UP</text>

  <!-- Second smaller window behind -->
  <rect x="240" y="40" width="160" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1.5" opacity="0.8"/>
  <rect x="240" y="40" width="160" height="22" rx="10" fill="#f5f5f5" opacity="0.8"/>
  <rect x="240" y="50" width="160" height="12" fill="#f5f5f5" opacity="0.8"/>
  <rect x="258" y="78" width="80" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="258" y="90" width="60" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="258" y="102" width="70" height="6" rx="3" fill="#e5e7eb"/>
  <!-- X button on small window -->
  <circle cx="385" cy="51" r="8" fill="#fee2e2"/>
  <text x="385" y="55" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">✕</text>

  <!-- Like/thumbs up bubble -->
  <circle cx="270" cy="220" r="28" fill="white" stroke="#f97316" stroke-width="2"/>
  <text x="270" y="228" font-family="Arial" font-size="20" text-anchor="middle">👍</text>

  <!-- Padlock -->
  <g transform="translate(370, 50)">
    <rect x="0" y="22" width="56" height="44" rx="8" fill="#f97316"/>
    <path d="M10 22 L10 14 C10 4 46 4 46 14 L46 22" stroke="#f97316" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M10 22 L10 14 C10 4 46 4 46 14 L46 22" stroke="#fb923c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="28" cy="40" r="6" fill="white" opacity="0.9"/>
    <rect x="25" y="43" width="6" height="8" rx="2" fill="white" opacity="0.9"/>
  </g>

  <!-- Woman figure -->
  <!-- Body/dress -->
  <ellipse cx="330" cy="380" rx="38" ry="50" fill="#f97316"/>
  <!-- Legs -->
  <rect x="310" y="418" width="16" height="40" rx="8" fill="#1e293b"/>
  <rect x="332" y="418" width="16" height="40" rx="8" fill="#1e293b"/>
  <!-- Shoes -->
  <ellipse cx="318" cy="458" rx="12" ry="6" fill="#0f172a"/>
  <ellipse cx="340" cy="456" rx="10" ry="5" fill="#f97316"/>
  <!-- Head -->
  <circle cx="328" cy="290" r="28" fill="#fbbf24"/>
  <!-- Hair -->
  <path d="M300 285 Q305 250 328 248 Q355 248 360 280 Q362 298 356 295 Q350 265 328 265 Q308 268 304 295 Z" fill="#1e293b"/>
  <path d="M360 285 Q368 300 365 320 Q358 310 356 295 Z" fill="#1e293b"/>
  <!-- Face details -->
  <circle cx="320" cy="288" r="3" fill="#92400e"/>
  <circle cx="336" cy="288" r="3" fill="#92400e"/>
  <path d="M320 300 Q328 307 336 300" stroke="#92400e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="320" y="316" width="16" height="18" rx="4" fill="#fbbf24"/>
  <!-- Left arm (pointing at screen) -->
  <path d="M293 345 Q255 320 215 295" stroke="#f97316" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Left hand/finger -->
  <circle cx="210" cy="292" r="8" fill="#fbbf24"/>
  <!-- Right arm down -->
  <path d="M365 345 Q375 370 372 400" stroke="#f97316" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Mobile phone (large, center-right) -->
  <rect x="200" y="200" width="130" height="230" rx="18" fill="#1e293b"/>
  <rect x="206" y="208" width="118" height="214" rx="14" fill="#f8fafc"/>
  <!-- Phone notch -->
  <rect x="240" y="204" width="50" height="10" rx="5" fill="#0f172a"/>
  <!-- Phone screen content -->
  <rect x="218" y="225" width="94" height="10" rx="4" fill="#f97316" opacity="0.8"/>
  <rect x="218" y="242" width="94" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="218" y="254" width="75" height="6" rx="3" fill="#e5e7eb"/>
  <!-- Input field on phone -->
  <rect x="218" y="270" width="94" height="18" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="228" cy="279" r="3.5" fill="#374151"/>
  <circle cx="237" cy="279" r="3.5" fill="#374151"/>
  <circle cx="246" cy="279" r="3.5" fill="#374151"/>
  <circle cx="255" cy="279" r="3.5" fill="#374151"/>
  <!-- Another input -->
  <rect x="218" y="295" width="94" height="18" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="225" y="300" width="50" height="5" rx="2" fill="#d1d5db"/>
  <!-- Button on phone -->
  <rect x="218" y="322" width="94" height="22" rx="7" fill="#f97316"/>
  <text x="265" y="337" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">Login Now</text>

  <!-- Leaf decoration -->
  <path d="M420 350 Q450 310 470 340 Q450 380 420 350 Z" fill="#22c55e" opacity="0.7"/>
  <path d="M425 350 Q445 320 435 345 Z" fill="#16a34a" opacity="0.5"/>
  <path d="M440 380 Q480 355 490 390 Q465 415 440 380 Z" fill="#22c55e" opacity="0.6"/>
  <!-- Leaf stem -->
  <path d="M420 350 Q435 370 440 400" stroke="#16a34a" stroke-width="2" fill="none"/>

  <!-- Small dots decoration -->
  <circle cx="70" cy="160" r="5" fill="#f97316" opacity="0.4"/>
  <circle cx="85" cy="175" r="3" fill="#f97316" opacity="0.3"/>
  <circle cx="60" cy="180" r="3" fill="#f97316" opacity="0.3"/>
  <circle cx="450" cy="200" r="6" fill="#3b82f6" opacity="0.3"/>
  <circle cx="465" cy="215" r="4" fill="#3b82f6" opacity="0.25"/>
</svg>
